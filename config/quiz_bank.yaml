          sensory_cerebral: { value: -0.2, confidence: 0.15 }
      B:
        text: "要不要出门的那一刻"
        signals:
          control_flow: { value: -0.5, confidence: 0.30 }
          novelty_appetite: { value: 0.2, confidence: 0.10 }
      C:
        text: "要不要回那条消息"
        signals:
          social_energy: { value: -0.3, confidence: 0.20 }
          decision_tempo: { value: -0.3, confidence: 0.20 }
      D:
