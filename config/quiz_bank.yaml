# 趣味题库
# 每道题是 ask_playful 动作的"弹药"
# Agent 根据当前 profile gap 和 user state 选择最合适的题
#
# 设计准则（新题必须满足至少 2 条）：
# 1. 有具体时间/空间锚点（"周五 7:30"、"地铁靠站"）
# 2. 透露个性而非表达需求（"你会……" 而非 "你想要……"）
# 3. 4 选而非 2 选
# 4. 每个 option 的 text 自身有画面
# 5. agent_response 要让用户觉得"被读懂"，不是复读

questions:

  # ============================================================
  # 第一梯队：破冰题（低门槛、高趣味、广泛适用）
  # ============================================================

  parallel_universe:
    id: "q_parallel_universe"
    tier: 1
    text: |
      想象一下：一觉醒来，你在一个完全陌生的城市。
      手机有电，钱包还在，但你不认识这里的任何一个字。
      你第一反应是？
    options:
      A:
        text: "先找一家人最多的店坐下来——有人气的地方不会差"
        signals:
          social_energy: { value: 0.4, confidence: 0.30 }
          novelty_appetite: { value: 0.2, confidence: 0.15 }
          decision_tempo: { value: 0.3, confidence: 0.20 }
      B:
        text: "打开地图，先搞清楚自己在哪"
        signals:
          control_flow: { value: 0.5, confidence: 0.30 }
          sensory_cerebral: { value: -0.4, confidence: 0.25 }
          decision_tempo: { value: -0.3, confidence: 0.20 }
      C:
        text: "随便走，迷路本身就是体验"
        signals:
          novelty_appetite: { value: 0.6, confidence: 0.35 }
          control_flow: { value: -0.5, confidence: 0.30 }
          decision_tempo: { value: 0.4, confidence: 0.20 }
      D:
        text: "找一个当地人搭话"
        signals:
          social_energy: { value: 0.6, confidence: 0.35 }
          novelty_appetite: { value: 0.3, confidence: 0.20 }
          control_flow: { value: 0.2, confidence: 0.15 }

    agent_responses:
      A: "你是那种靠直觉找路的人——人多的地方就是安全感。以后我给你推荐的时候会留意'人气'这个信号。"
      B: "掌控全局型选手。放心，我以后给你的每个推荐都会带上'为什么推这个'。"
      C: "你骨子里是个冒险家。以后我推荐里永远会藏一个你绝对没见过的选项。"
      D: "社交天赋点满了。你这种人走到哪都能交到朋友——我以后帮你找的地方也会考虑'容不容易跟人聊起来'。"

    primary_dimensions: ["novelty_appetite", "control_flow"]
    secondary_dimensions: ["social_energy", "decision_tempo"]

  subway_glance:
    id: "q_subway_glance"
    tier: 1
    text: |
      地铁靠站，你抬头的瞬间同时看到三种画面闪过。
      最先让你想多看一眼的是？
    options:
      A:
        text: "一个陌生人在笔记本上画一张很复杂的图"
        signals:
          sensory_cerebral: { value: -0.4, confidence: 0.25 }
          novelty_appetite: { value: 0.3, confidence: 0.20 }
      B:
        text: "对面姑娘耳机里漏出的半句歌词"
        signals:
          sensory_cerebral: { value: 0.5, confidence: 0.30 }
          social_energy: { value: 0.2, confidence: 0.15 }
      C:
        text: "玻璃倒影里自己今天的表情"
        signals:
          sensory_cerebral: { value: 0.3, confidence: 0.20 }
          social_energy: { value: -0.4, confidence: 0.25 }
      D:
        text: "窗外楼间一道突然亮起的霓虹"
        signals:
          novelty_appetite: { value: 0.5, confidence: 0.30 }
          sensory_cerebral: { value: 0.3, confidence: 0.15 }
    agent_responses:
      A: "你被'别人脑子里的东西'吸引——典型的信息狩猎型。我推荐里会多掺点'他们是怎么想的'这种维度。"
      B: "你对气味、声音、半截信息敏感。我以后选店会先看这家的'空气'对不对。"
      C: "很少见的'当下感'——你跟自己相处得挺舒服。我不会用太多选项烦你。"
      D: "你在找的是那个'意外亮起的瞬间'。我以后藏新东西给你的时候，会确保它真的能让你眼前一亮。"
    primary_dimensions: ["sensory_cerebral", "novelty_appetite"]
    secondary_dimensions: ["social_energy"]

  phone_notification:
    id: "q_phone_notification"
    tier: 1
    text: |
      周四下午，你手机同时弹出四条推送——你会先点哪个？
    options:
      A:
        text: "你关注的那家餐厅刚开放下周预约"
        signals:
          novelty_appetite: { value: -0.3, confidence: 0.20 }
          control_flow: { value: 0.3, confidence: 0.20 }
          decision_tempo: { value: -0.2, confidence: 0.15 }
      B:
        text: "附近 3 公里有家新开的店，算法说你会喜欢"
        signals:
          novelty_appetite: { value: 0.5, confidence: 0.30 }
          decision_tempo: { value: 0.3, confidence: 0.20 }
      C:
        text: "老朋友发来：在吗"
        signals:
          social_energy: { value: 0.5, confidence: 0.30 }
          novelty_appetite: { value: -0.1, confidence: 0.10 }
      D:
        text: "天气预警：今晚有雷阵雨"
        signals:
          sensory_cerebral: { value: -0.3, confidence: 0.20 }
          control_flow: { value: 0.4, confidence: 0.25 }
    agent_responses:
      A: "你心里已经有一份'想去的清单'，等的是时机。我会帮你盯着那些不容易订到的位子。"
      B: "算法推荐你也乐意点——对新店有好奇但不排斥被引导。我会给你留一个'未被验证过但我觉得你会喜欢'的位置。"
      C: "人的信号永远优先。我以后找地方的时候也会考虑'这地方适不适合'在吗'的朋友'。"
      D: "你对环境变化敏感，是会提前收衣服的人。那我也会把'天气 + 出行 + 吃饭'串起来看。"
    primary_dimensions: ["novelty_appetite", "social_energy"]
    secondary_dimensions: ["decision_tempo", "control_flow"]

  friday_730pm:
    id: "q_macaron_friday"
    tier: 1
    text: |
      周五 7:30，你关掉电脑坐在椅子上。
      接下来 15 分钟你大概率在——
    options:
      A:
        text: "刷手机找一家必定不会出错的店"
        signals:
          novelty_appetite: { value: -0.4, confidence: 0.25 }
          decision_tempo: { value: 0.2, confidence: 0.15 }
      B:
        text: "翻收藏夹里那家想去很久没去的"
        signals:
          novelty_appetite: { value: 0.3, confidence: 0.20 }
          control_flow: { value: 0.3, confidence: 0.20 }
      C:
        text: "先躺 10 分钟再说"
        signals:
          decision_tempo: { value: -0.4, confidence: 0.25 }
          control_flow: { value: -0.4, confidence: 0.25 }
      D:
        text: "问群里有没有人一起"
        signals:
          social_energy: { value: 0.5, confidence: 0.30 }
          decision_tempo: { value: 0.2, confidence: 0.15 }
    agent_responses:
      A: "周五不想冒险——我懂。你那份'不会出错的店'清单，以后我帮你维护。"
      B: "有'积攒'型的愿望清单。那我以后会在周五主动推你收藏里还没去的那家。"
      C: "这种状态我懂。15 分钟后我再问你饿不饿，不吵你。"
      D: "周五的你想要人味儿。我可以帮你在群里直接扔一张'这家人均 150、周五还有位'的卡。"
    primary_dimensions: ["decision_tempo", "novelty_appetite"]
    secondary_dimensions: ["social_energy", "control_flow"]

  elevator_choice:
    id: "q_elevator_choice"
    tier: 1
    text: |
      外卖平台刚刷出来一家新店，你手指停在上面 3 秒——
      这 3 秒里你在干嘛？
    options:
      A:
        text: "已经翻到评论区了"
        signals:
          decision_tempo: { value: -0.45, confidence: 0.30 }
          sensory_cerebral: { value: -0.3, confidence: 0.20 }
      B:
        text: "点进图片看菜品"
        signals:
          decision_tempo: { value: -0.2, confidence: 0.15 }
          sensory_cerebral: { value: 0.4, confidence: 0.25 }
      C:
        text: "看完店名就已经决定了"
        signals:
          decision_tempo: { value: 0.5, confidence: 0.30 }
          novelty_appetite: { value: 0.3, confidence: 0.20 }
      D:
        text: "直接划走了"
        signals:
          decision_tempo: { value: 0.4, confidence: 0.25 }
          novelty_appetite: { value: -0.3, confidence: 0.20 }
    agent_responses:
      A: "研究型选手。你从评论里读出来的信息量是我的三倍——我会把评论精要前置给你。"
      B: "看图定胃口——视觉型。那我推荐也会先给图不是文字。"
      C: "直觉型选手。你相信自己的第一反应——那我也会帮你保护这种反应，先上结论再解释。"
      D: "稳。你知道什么是你不想要的，这已经省了大量时间。我以后也会学会更快地从你的'划走'里找规律。"
    primary_dimensions: ["decision_tempo", "sensory_cerebral"]
    secondary_dimensions: ["novelty_appetite"]

  # ============================================================
  # 第二梯队：深入题（更细腻的信号，需要一定信任基础）
  # ============================================================

  last_song:
    id: "q_last_song"
    tier: 2
    text: |
      深夜，耳机里最后一首歌放完了。你更可能——
    options:
      A:
        text: "再来一首，这种感觉不想断"
        signals:
          sensory_cerebral: { value: 0.5, confidence: 0.30 }
          social_energy: { value: -0.2, confidence: 0.10 }
      B:
        text: "摘下耳机，听听周围的声音"
        signals:
          sensory_cerebral: { value: 0.2, confidence: 0.15 }
          control_flow: { value: -0.3, confidence: 0.20 }
      C:
        text: "给某个人发一条消息"
        signals:
          social_energy: { value: 0.5, confidence: 0.30 }
          sensory_cerebral: { value: 0.1, confidence: 0.10 }
      D:
        text: "打开冰箱看看有什么"
        signals:
          decision_tempo: { value: 0.4, confidence: 0.25 }
          sensory_cerebral: { value: 0.2, confidence: 0.15 }
    agent_responses:
      A: "你是沉浸式体验型——一旦进入某个状态就不想出来。我以后给你推荐的时候，会更注重'氛围'这个维度。"
      B: "你有一种很少见的'在场感'。我猜你吃东西也是，比起网红店更在意此刻的体验本身。"
      C: "深夜的念想通常最真实。你的快乐好像跟'分享给谁'有关——我以后帮你找的地方，也会考虑'适不适合带人去'。"
      D: "行动派。想到什么就做什么。我以后给你推荐也会更直接——不废话，直接上方案。"
    primary_dimensions: ["sensory_cerebral", "social_energy"]
    secondary_dimensions: ["decision_tempo", "control_flow"]

  boring_sunday:
    id: "q_boring_sunday"
    tier: 2
    text: |
      周日下午三点，什么计划都没有，手机也不太想看了。
      你大概率会——
    options:
      A:
        text: "出门随便走走，没有目的地"
        signals:
          novelty_appetite: { value: 0.3, confidence: 0.20 }
          control_flow: { value: -0.3, confidence: 0.20 }
          social_energy: { value: -0.1, confidence: 0.10 }
      B:
        text: "约人出来，哪怕只是喝杯咖啡"
        signals:
          social_energy: { value: 0.5, confidence: 0.30 }
          decision_tempo: { value: 0.3, confidence: 0.15 }
      C:
        text: "找个什么东西研究一下午"
        signals:
          sensory_cerebral: { value: -0.5, confidence: 0.30 }
          social_energy: { value: -0.3, confidence: 0.20 }
      D:
        text: "什么都不做，发呆也挺好"
        signals:
          control_flow: { value: -0.4, confidence: 0.25 }
          sensory_cerebral: { value: 0.2, confidence: 0.15 }
    agent_responses:
      A: "无目的的散步往往有最好的发现。你是那种'走着走着就走进一家店'的人吧——我会帮你留意散步路线上的惊喜。"
      B: "社交充电型。对你来说'吃什么'可能没那么重要，重要的是'跟谁吃'。"
      C: "Rabbit hole 爱好者。你研究吃的时候是不是也会突然花两小时看某种食材的历史？"
      D: "你享受'没有计划'本身。那我以后不会在你没需求的时候打扰你——除非我发现了一个你真的不能错过的东西。"
    primary_dimensions: ["social_energy", "sensory_cerebral"]
    secondary_dimensions: ["novelty_appetite", "control_flow"]

  fake_chat:
    id: "q_fake_chat"
    tier: 2
    text: |
      朋友发你这条消息：
      "今晚想吃顿好的但不想自己挑，给我推一家"
      你最可能回哪种？
    options:
      A:
        text: "上次那家还不错，再去一次？"
        signals:
          novelty_appetite: { value: -0.4, confidence: 0.25 }
          social_energy: { value: 0.3, confidence: 0.20 }
      B:
        text: "你今天想吃辣还是清淡"
        signals:
          control_flow: { value: 0.3, confidence: 0.20 }
          decision_tempo: { value: -0.3, confidence: 0.20 }
      C:
        text: "[扔一个链接] 这家我昨天看到"
        signals:
          novelty_appetite: { value: 0.5, confidence: 0.30 }
          decision_tempo: { value: 0.3, confidence: 0.20 }
      D:
        text: "在吗我现在也饿了，一起"
        signals:
          social_energy: { value: 0.6, confidence: 0.30 }
          decision_tempo: { value: 0.3, confidence: 0.15 }
    agent_responses:
      A: "你的记忆里有'安全屋'清单。我以后帮你维护这份清单——偶尔提醒你哪家要续一下。"
      B: "先收集信息再出牌——典型的二次确认型。我给你的推荐也会带上'因为你说了辣'这种理由。"
      C: "你平时就已经在囤'下次可能用得上'的店——这种人品味一般都很稳。我会给你留一个'新发现'的频道。"
      D: "你能把一个推荐需求秒变聚餐。那我以后找地方也会考虑'顺手再约一个'的可能性。"
    primary_dimensions: ["novelty_appetite", "social_energy"]
    secondary_dimensions: ["decision_tempo", "control_flow"]

  six_person_groupchat:
    id: "q_macaron_group"
    tier: 2
    text: |
      六人饭局的群刚被拉起来，其他人都在@"随便"。
      你通常扮演——
    options:
      A:
        text: "第一个扔链接的"
        signals:
          social_energy: { value: 0.4, confidence: 0.25 }
          decision_tempo: { value: 0.4, confidence: 0.25 }
          control_flow: { value: 0.3, confidence: 0.20 }
      B:
        text: "最后拍板的"
        signals:
          control_flow: { value: 0.5, confidence: 0.30 }
          decision_tempo: { value: -0.2, confidence: 0.15 }
      C:
        text: "默默潜水等结论"
        signals:
          social_energy: { value: -0.4, confidence: 0.25 }
          control_flow: { value: -0.3, confidence: 0.20 }
      D:
        text: "问一圈'你们都能吃什么'的"
        signals:
          social_energy: { value: 0.3, confidence: 0.20 }
          sensory_cerebral: { value: -0.3, confidence: 0.20 }
          decision_tempo: { value: -0.3, confidence: 0.20 }
    agent_responses:
      A: "你是那个让群别卡住的人。以后我帮你选地方的时候也会先给一家默认答案——你不用还得自己发起。"
      B: "拍板型玩家。前面让大家讨论，最后看你的——我会给你精简到 2-3 个靠谱选项。"
      C: "你的能量不适合无序的群聊。那我来帮你，把'这顿到底吃哪'三句话说清楚。"
      D: "你比发起人还操心。下次我直接帮你收集群里的忌口，你就不用一个个问了。"
    primary_dimensions: ["social_energy", "control_flow"]
    secondary_dimensions: ["decision_tempo"]

  late_night_hunger:
    id: "q_macaron_cook"
    tier: 2
    text: |
      深夜 11 点，肚子突然有点饿。
      楼下烧烤摊的味道飘上来——你身体先做的事是？
    options:
      A:
        text: "已经在翻外卖 app"
        signals:
          decision_tempo: { value: 0.5, confidence: 0.30 }
          control_flow: { value: -0.2, confidence: 0.15 }
      B:
        text: "倒一杯水骗一下自己"
        signals:
          decision_tempo: { value: -0.4, confidence: 0.25 }
          control_flow: { value: 0.4, confidence: 0.25 }
      C:
        text: "下楼买一串尝尝就回"
        signals:
          novelty_appetite: { value: 0.3, confidence: 0.20 }
          sensory_cerebral: { value: 0.4, confidence: 0.25 }
          decision_tempo: { value: 0.3, confidence: 0.20 }
      D:
        text: "默默关窗"
        signals:
          control_flow: { value: 0.5, confidence: 0.30 }
          sensory_cerebral: { value: -0.2, confidence: 0.15 }
    agent_responses:
      A: "听身体话的选手——别人还在纠结你已经在等骑手了。我以后给你的推荐会把'送达时间'放前面。"
      B: "你能赢自己。但作为生活搭子我还是会偶尔怂恿你一下，别太亏待自己。"
      C: "'体验一下'就值——你对气味和现场很敏感。我会多给你推可以现场感受的地方。"
      D: "自控力选手。那我以后不会在深夜主动推吃的给你——你愿意聊的时候我再上。"
    primary_dimensions: ["decision_tempo", "sensory_cerebral"]
    secondary_dimensions: ["control_flow", "novelty_appetite"]

  two_restaurant_wait:
    id: "q_two_restaurant_wait"
    tier: 2
    text: |
      两家邻近的店你都没去过——
      一家要等 40 分钟，一家可以马上坐下。
      你通常怎么选？
    options:
      A:
        text: "等 40 分钟的那家（能等 40 分钟肯定有原因）"
        signals:
          decision_tempo: { value: -0.4, confidence: 0.25 }
          novelty_appetite: { value: 0.3, confidence: 0.20 }
      B:
        text: "能坐下的那家（省的就是时间）"
        signals:
          decision_tempo: { value: 0.5, confidence: 0.30 }
          control_flow: { value: -0.2, confidence: 0.15 }
      C:
        text: "再刷两眼点评决定"
        signals:
          decision_tempo: { value: -0.5, confidence: 0.30 }
          sensory_cerebral: { value: -0.4, confidence: 0.25 }
      D:
        text: "走远一点换第三家"
        signals:
          novelty_appetite: { value: 0.4, confidence: 0.25 }
          control_flow: { value: 0.3, confidence: 0.20 }
    agent_responses:
      A: "你愿意为'可能的惊喜'付时间。那我以后在热门店那一列会把等位时间算清楚再推你。"
      B: "时间是你的硬成本。那我会把'现在就能坐'作为一条常驻筛选线。"
      C: "你不让自己后悔——先拿证据再决定。我以后会把对比摆在你面前，不替你跳过这一步。"
      D: "你不愿意被两个选项夹住——典型的保留第三选项型。那我推荐也会给你留一个'跳出来想'的选项。"
    primary_dimensions: ["decision_tempo", "novelty_appetite"]
    secondary_dimensions: ["control_flow", "sensory_cerebral"]

  cart_abandonment:
    id: "q_cart_abandonment"
    tier: 2
    text: |
      你的购物车里躺了一件东西 11 天了——
      最可能的后续是？
    options:
      A:
        text: "今天就下单，拖够了"
        signals:
          decision_tempo: { value: 0.4, confidence: 0.25 }
          sensory_cerebral: { value: 0.2, confidence: 0.15 }
      B:
        text: "再等一次折扣"
        signals:
          decision_tempo: { value: -0.4, confidence: 0.25 }
          sensory_cerebral: { value: -0.3, confidence: 0.20 }
      C:
        text: "干脆删掉，留着就是不想要"
        signals:
          decision_tempo: { value: 0.3, confidence: 0.20 }
          control_flow: { value: 0.4, confidence: 0.25 }
      D:
        text: "买一个更便宜的替代品"
        signals:
          decision_tempo: { value: -0.2, confidence: 0.15 }
          sensory_cerebral: { value: -0.4, confidence: 0.25 }
    agent_responses:
      A: "你给自己一个明确的期限。那我以后给你找东西也会直接给截止时间：'今晚 8 点前拍板'。"
      B: "耐心换空间。那我会帮你盯着价格线，降到阈值我告诉你。"
      C: "你对'没下单'本身就是信号——果断而不自我欺骗。我会学会从你的'不选'里读出更多。"
      D: "你会给自己找到替代路径。那我以后推 A 的时候会顺手给你一个 B。"
    primary_dimensions: ["decision_tempo", "sensory_cerebral"]
    secondary_dimensions: ["control_flow", "novelty_appetite"]

