        text: "你关注的那位博主上周刚去过"
        signals:
          social_energy: { value: 0.3, confidence: 0.20 }
          novelty_appetite: { value: 0.2, confidence: 0.15 }
      D:
        text: "老板说欢迎一个人来，有吧台位"
        signals:
          social_energy: { value: -0.5, confidence: 0.30 }
          sensory_cerebral: { value: 0.4, confidence: 0.25 }
    agent_responses:
      A: "你吃数据那一套——群体验证过的东西心里更踏实。我会给你先过一遍热度和稳定性。"
      B: "你对'刚冒头的好东西'最敏感。那我以后推荐里会给你留一个'小众但凶'的位置。"
      C: "你对'我认识的人去过'这种信号最有反应。那我以后会给你加一个'你关注的博主最近都在哪'的追踪。"
      D: "你要的是一个人也舒服的空间。'吧台位'和'老板愿意聊'是你的关键词——我会把它作为排序维度。"
    primary_dimensions: ["sensory_cerebral", "novelty_appetite"]
    secondary_dimensions: ["social_energy"]

# 选题策略配置
selection_strategy:
  # 优先选信息增益最高的题（即当前 confidence 最低的维度对应的题）
  primary_criterion: "max_info_gain"
  # tier 1 的题不需要前置条件
  # tier 2 的题需要 rapport > 0.4
  # tier 3 的题需要 rapport > 0.6 且至少已有 2 个维度 confidence > 0.3
  tier_requirements:
    1: { min_rapport: 0.0, min_profiled_dims: 0 }
    2: { min_rapport: 0.4, min_profiled_dims: 0 }
    3: { min_rapport: 0.6, min_profiled_dims: 2 }
