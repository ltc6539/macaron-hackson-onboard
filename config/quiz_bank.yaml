      B: "出不出门这个决定对你其实是最重的那个。我会在周末早上先帮你过一遍天气、热度、朋友档期，再轻轻推你一下。"
      C: "人际决策最耗你能量。我不是那个能帮你的 AI，但我可以帮你把该回的消息之外的杂事都减掉。"
      D: "'想要'和'要不要'之间那条线你想让别人帮你划。我不会替你决定，但我会帮你把后悔成本算清楚。"
